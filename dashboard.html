<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Dashboard · HCI Cognitive Lab</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --border: #2a2a2a;
  --text: #f0f0f0;
  --muted: #666;
  --accent: #e8ff4a;
  --accent2: #ff4a6e;
  --accent3: #4affda;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Space Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(232,255,74,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,255,74,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

  /* Pantalla de login */
#login-screen {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: rgba(10,10,10,0.95);
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 40px 32px;
  width: 340px;
  border-radius: 8px;
  text-align: center;
}
.login-box h1 {
  font-family: 'Syne', sans-serif;
  font-size: 24px;
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 8px;
}
.login-box p {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 28px;
}
.login-box input {
  width: 100%;
  padding: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  border-radius: 4px;
  margin-bottom: 12px;
}
.login-box input:focus {
  outline: none;
  border-color: var(--accent);
}
.login-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #000;
  border: none;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  border-radius: 4px;
  margin-top: 8px;
}
.logout-btn {
  background: var(--surface);
  border: 1px solid var(--accent2);
  color: var(--accent2);
  margin-left: 12px;
}
.error-msg {
  color: var(--accent2);
  font-size: 11px;
  margin-top: 12px;
}
/* Dashboard (inicialmente oculto) */
#dashboard {
  display: none;
  position: relative;
  z-index: 1;
}
#dashboard { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 32px; border-bottom: 1px solid var(--border);
  background: rgba(10,10,10,0.9); backdrop-filter: blur(10px);
  position: sticky; top: 0; z-index: 100; flex-wrap: wrap; gap: 12px;
}
.topbar-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
.topbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.btn-sm {
  padding: 6px 14px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px;
  cursor: pointer; border-radius: 2px; transition: all 0.2s; letter-spacing: 0.05em;
  white-space: nowrap;
}
.btn-accent { background: var(--accent); color: #000; border: none; }
.btn-accent:hover { opacity: 0.85; }
.btn-outline { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }
.refresh-time { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
.task-nav {
  display: flex; gap: 4px; padding: 12px 32px; border-bottom: 1px solid var(--border);
  background: rgba(10,10,10,0.6); overflow-x: auto; scrollbar-width: none;
}
.task-nav::-webkit-scrollbar { display: none; }
.task-btn {
  padding: 7px 16px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px;
  letter-spacing: 0.08em; text-transform: uppercase; border-radius: 2px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  transition: all 0.15s; white-space: nowrap;
}
.task-btn:hover { color: var(--text); border-color: #444; }
.task-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.main { padding: 28px 32px; max-width: 1280px; margin: 0 auto; width: 100%; }
.filters-bar {
  margin-bottom: 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  background: var(--surface); padding: 14px 20px; border: 1px solid var(--border); border-radius: 4px;
}
.filter-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 700; }
.filter-select {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 6px 14px; font-family: 'Space Mono', monospace; font-size: 11px;
  border-radius: 2px; cursor: pointer;
}
.filter-select:hover { border-color: var(--accent); }
.stat-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px; margin-bottom: 24px;
}
.stat-card { background: var(--surface); border: 1px solid var(--border); padding: 18px 20px; border-radius: 4px; }
.stat-card:hover { border-color: var(--accent); }
.stat-label { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.stat-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; word-break: break-word; }
.stat-value.accent  { color: var(--accent); }
.stat-value.accent2 { color: var(--accent2); }
.stat-value.accent3 { color: var(--accent3); }
.stat-sub { font-size: 9px; color: var(--muted); margin-top: 4px; }
.chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px; margin-bottom: 24px; }
.chart-title { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
canvas { max-height: 260px; width: 100%; }
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow-x: auto; margin-bottom: 20px; }
.table-header { padding: 13px 20px; border-bottom: 1px solid var(--border); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.data-table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 700px; }
.data-table th { padding: 10px 12px; text-align: left; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }
.data-table td { padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); white-space: nowrap; }
.data-table tr:hover td { background: rgba(255,255,255,0.025); }
.tag { display: inline-block; padding: 2px 8px; border-radius: 2px; font-size: 9px; text-transform: uppercase; font-family: 'Syne', sans-serif; font-weight: 700; }
.tag-exp  { background: rgba(232,255,74,0.12); color: var(--accent); }
.tag-ctrl { background: rgba(74,255,218,0.12); color: var(--accent3); }
.error-msg { background: rgba(255,74,110,0.1); border-left: 3px solid var(--accent2); padding: 14px 20px; margin-bottom: 20px; font-size: 11px; border-radius: 2px; }
.loading { padding: 40px; text-align: center; color: var(--muted); }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 680px) {
  .main { padding: 16px; }
  .topbar { padding: 12px 16px; }
  .task-nav { padding: 10px 16px; }
  .stat-row { grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-value { font-size: 20px; }
  .data-table { font-size: 9px; min-width: 520px; }
  .data-table th, .data-table td { padding: 6px 8px; }
}
</style>
</head>
<body>
<!-- Pantalla de login -->
<div id="login-screen">
  <div class="login-box">
    <h1>🔐 ACCESO RESTRINGIDO</h1>
    <p>Dashboard de administración</p>
    <input type="email" id="login-email" placeholder="Email" autocomplete="off">
    <input type="password" id="login-password" placeholder="Contraseña">
    <button class="login-btn" onclick="login()">INICIAR SESIÓN</button>
    <div id="login-error" class="error-msg" style="display:none;"></div>
  </div>
</div>

<!-- Dashboard (contenido real, igual que antes pero ahora con botón de logout) -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">HCI · COGNITIVE LAB | DASHBOARD</div>
    <div class="topbar-right">
      <span class="refresh-time" id="refresh-time"></span>
      <button class="btn-sm btn-outline" onclick="loadData()">↺ REFRESH</button>
      <button class="btn-sm btn-accent" onclick="exportCSV()">↓ CSV</button>
      <button class="btn-sm btn-accent" onclick="exportPDF()" style="background:var(--accent2);">📄 PDF</button>
      <button class="btn-sm logout-btn" onclick="logout()">🚪 CERRAR SESIÓN</button>
    </div>
  </div>


  <div class="task-nav">
    <button class="task-btn" data-task="stroop"  onclick="switchTask('stroop')">Stroop</button>
    <button class="task-btn" data-task="flanker" onclick="switchTask('flanker')">Flanker</button>
    <button class="task-btn" data-task="simon"   onclick="switchTask('simon')">Simon</button>
    <button class="task-btn" data-task="gonogo"  onclick="switchTask('gonogo')">Go/No-go</button>
    <button class="task-btn" data-task="ant"     onclick="switchTask('ant')">ANT</button>
    <button class="task-btn" data-task="nback"   onclick="switchTask('nback')">N-back</button>
    <button class="task-btn" data-task="posner"  onclick="switchTask('posner')">Posner</button>
    <button class="task-btn" data-task="taskswitch" onclick="switchTask('taskswitch')">Task Switch</button>
    <button class="task-btn" data-task="wcst"    onclick="switchTask('wcst')">WCST</button>
  </div>
  <div class="main" id="reportContainer">
    <div class="filters-bar">
      <span class="filter-label">Filtrar</span>
      <select id="groupFilter" class="filter-select" onchange="applyFilters()">
        <option value="all">Todos los grupos</option>
        <option value="experimental">Experimental</option>
        <option value="control">Control</option>
      </select>
      <span class="filter-sep">·</span>
      <span class="filter-label">Mostrar</span>
      <select id="limitFilter" class="filter-select" onchange="applyFilters()">
        <option value="50">Últimos 50</option>
        <option value="200">Últimos 200</option>
        <option value="2000" selected>Todos (hasta 2000)</option>
      </select>
    </div>
    <div id="errorMsg" class="error-msg" style="display:none;"></div>
    <div id="statsContainer" class="stat-row"></div>
    <div class="chart-container">
      <div class="chart-title">// MÉTRICA PRINCIPAL POR PARTICIPANTE</div>
      <canvas id="taskChart" width="400" height="200"></canvas>
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <span id="tableTitle">📊 RESUMEN POR PARTICIPANTE</span>
        <span id="tableCount"></span>
      </div>
      <div style="overflow-x:auto;">
        <table class="data-table" id="participantTable">
          <thead id="participantTableHead"></thead>
          <tbody id="participantTableBody"><tr><td colspan="10" class="loading"><span class="spinner"></span>Cargando...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script>
// ============================================================
// 
// ============================================================
const SUPABASE_URL = 'https://ckukuuneveqlwpcmlmun.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gkhNagCh40x8ba1J9s461Q_o7IqGiTn';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);SUPABASE_KEY);
//  SUP
// ============================================================
//  LOGIN / LOGOUT
// ============================================================
async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const errorDiv = document.getElementById('login-error');
  errorDiv.style.display = 'none';
  
  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) throw error;
    
    // Login exitoso: ocultar login y mostrar dashboard
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    
    // Cargar los datos del dashboard
    if (typeof loadData === 'function') loadData();
    
  } catch (err) {
    errorDiv.style.display = 'block';
    errorDiv.innerText = 'Error: ' + (err.message || 'Credenciales incorrectas');
  }
}

// ============================================================
//  LOGOUT CORREGIDO
// ============================================================
async function logout() {
  await supabaseClient.auth.signOut();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
  }
// ============================================================
//  COMPROBAR SESIÓN AL CARGAR LA PÁGINA
// ============================================================

  
const TASK_CONFIG = {
  stroop:  { table: 'stroop_trials',  rtField: 'rt',    groupField: 'cohort' },
  flanker: { table: 'flanker_trials', rtField: 'rt_ms', groupField: 'cohort' },
  simon:   { table: 'simon_trials',   rtField: 'rt_ms', groupField: 'cohort' },
  gonogo:  { table: 'gonogo_trials',  rtField: 'rt_ms', groupField: 'cohort' },
  ant:     { table: 'ant_trials',     rtField: 'rt_ms', groupField: 'cohort' },
  nback:   { table: 'nback_trials',   rtField: 'rt_ms', groupField: 'cohort' },
  posner:  { table: 'posner_trials',  rtField: 'rt_ms', groupField: 'cohort' },
  taskswitch: { table: 'task_switch_trials', rtField: 'rt_ms', groupField: 'cohort' },
  wcst:    { table: 'wcst_trials',    rtField: 'rt_ms', groupField: 'cohort' }
};

function normalizeRow(row, cfg) {
  const r = { ...row };
  if (cfg.rtField !== 'rt') r.rt = row[cfg.rtField] ?? null;
  if (cfg.groupField !== 'group') r.group = row[cfg.groupField] ?? 'control';
  return r;
}

let currentTask = 'stroop';
let rawData = [];
let allData = [];
let chartInstance = null;

async function loadData() {
  const cfg = TASK_CONFIG[currentTask];
  const limit = parseInt(document.getElementById('limitFilter').value);
  const errorDiv = document.getElementById('errorMsg');
  errorDiv.style.display = 'none';
  document.getElementById('participantTableBody').innerHTML = '<tr><td colspan="10" class="loading"><span class="spinner"></span>Cargando...</td></tr>';
  try {
    const { data, error } = await db.from(cfg.table).select('*').order('created_at', { ascending: false }).limit(limit);
    if (error) throw error;
    rawData = data || [];
    allData = rawData.map(r => normalizeRow(r, cfg));
    if (!allData.length) errorDiv.style.display = 'block', errorDiv.innerHTML = `⚠️ No hay datos en <strong>${cfg.table}</strong>.`;
    applyFilters(false);
    document.getElementById('refresh-time').innerText = 'Actualizado: ' + new Date().toLocaleTimeString();
  } catch(e) {
    errorDiv.style.display = 'block';
    errorDiv.innerHTML = `❌ Error: ${e.message}<br>· La tabla ${cfg.table} no existe o no tiene SELECT.`;
    document.getElementById('participantTableBody').innerHTML = '<tr><td colspan="10" class="loading">Sin datos</td></tr>';
  }
}

function switchTask(task) {
  currentTask = task;
  document.querySelectorAll('.task-btn').forEach(b => b.classList.toggle('active', b.dataset.task === task));
  loadData();
}

function applyFilters() {
  const groupFilter = document.getElementById('groupFilter').value;
  const filtered = groupFilter === 'all' ? allData : allData.filter(d => (d.group || '').toLowerCase() === groupFilter);
  renderStats(filtered);
  renderParticipantTable(filtered);
  renderChart(filtered);
}

function mean(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function std(arr) { if(arr.length<2) return 0; let m=mean(arr); return Math.sqrt(arr.reduce((s,x)=>s+(x-m)**2,0)/(arr.length-1)); }

function renderStats(data) {
  const container = document.getElementById('statsContainer');
  if (!data.length) { container.innerHTML = '<div class="stat-card"><div class="stat-label">Sin datos</div><div class="stat-value">—</div></div>'; return; }
  const participants = [...new Set(data.map(d=>d.participant_id).filter(Boolean))];
  const totalTrials = data.length;
  const correctCount = data.filter(d=>d.correct).length;
  let html = `<div class="stat-card"><div class="stat-label">Participantes</div><div class="stat-value accent">${participants.length}</div></div>
              <div class="stat-card"><div class="stat-label">Total ensayos</div><div class="stat-value">${totalTrials}</div><div class="stat-sub">${correctCount} correctos</div></div>
              <div class="stat-card"><div class="stat-label">Precisión global</div><div class="stat-value accent3">${(correctCount/totalTrials*100).toFixed(1)}%</div></div>`;

  if (currentTask === 'stroop' || currentTask === 'flanker' || currentTask === 'simon') {
    const valid = data.filter(t => t.correct && t.rt >= 200 && t.rt <= 2000);
    const cong = valid.filter(t => t.congruent).map(t=>t.rt);
    const incong = valid.filter(t => !t.congruent).map(t=>t.rt);
    const effect = (cong.length && incong.length) ? Math.round(mean(incong)-mean(cong)) : '—';
    const label = currentTask === 'stroop' ? 'Efecto Stroop' : (currentTask === 'flanker' ? 'Efecto Flanker' : 'Efecto Simon');
    html += `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value accent2">${effect} ms</div><div class="stat-sub">${valid.length} válidos</div></div>
             <div class="stat-card"><div class="stat-label">RT Congruente</div><div class="stat-value">${cong.length ? Math.round(mean(cong)) : '—'} ms</div></div>
             <div class="stat-card"><div class="stat-label">RT Incongruente</div><div class="stat-value">${incong.length ? Math.round(mean(incong)) : '—'} ms</div></div>`;
  } 
  else if (currentTask === 'gonogo') {
    const go = data.filter(t => t.stimulus_type === 'go');
    const nogo = data.filter(t => t.stimulus_type === 'nogo');
    const hits = go.filter(t=>t.correct).length;
    const fa = nogo.filter(t=>!t.correct).length;
    const hr = hits / (go.length||1), far = fa / (nogo.length||1);
    const dPrime = ((Math.log((hr+0.01)/(1.01-hr)) - Math.log((far+0.01)/(1.01-far))) / 1.414).toFixed(3);
    html += `<div class="stat-card"><div class="stat-label">d'</div><div class="stat-value accent3">${dPrime}</div></div>
             <div class="stat-card"><div class="stat-label">Aciertos / FA</div><div class="stat-value">${hits} / ${fa}</div></div>`;
  }
  else if (currentTask === 'ant') {
    const valid = data.filter(t => t.correct && t.rt >= 200 && t.rt <= 2000);
    const cong = valid.filter(t => t.flanker_type === 'congruent').map(t=>t.rt);
    const incong = valid.filter(t => t.flanker_type === 'incongruent').map(t=>t.rt);
    const conflict = (cong.length && incong.length) ? Math.round(mean(incong)-mean(cong)) : '—';
    html += `<div class="stat-card"><div class="stat-label">Conflicto ANT</div><div class="stat-value accent2">${conflict} ms</div></div>`;
  }
  else if (currentTask === 'nback') {
    const targets = data.filter(t => t.is_target === true);
    const nontargets = data.filter(t => t.is_target === false);
    const hits = targets.filter(t=>t.correct).length, fa = nontargets.filter(t=>!t.correct).length;
    const hr = hits/(targets.length||1), far = fa/(nontargets.length||1);
    const dPrime = ((Math.log((hr+0.01)/(1.01-hr)) - Math.log((far+0.01)/(1.01-far))) / 1.414).toFixed(3);
    html += `<div class="stat-card"><div class="stat-label">d' N-back</div><div class="stat-value accent3">${dPrime}</div></div>
             <div class="stat-card"><div class="stat-label">Aciertos/FA</div><div class="stat-value">${hits}/${fa}</div></div>`;
  }
  else if (currentTask === 'posner') {
    const valid = data.filter(t => t.correct && t.rt >= 200 && t.rt <= 2000);
    const validCue = valid.filter(t => t.valid_trial === true).map(t=>t.rt);
    const invalidCue = valid.filter(t => t.valid_trial === false).map(t=>t.rt);
    const effect = (validCue.length && invalidCue.length) ? Math.round(mean(invalidCue)-mean(validCue)) : '—';
    html += `<div class="stat-card"><div class="stat-label">RT Válido</div><div class="stat-value accent3">${validCue.length ? Math.round(mean(validCue)) : '—'} ms</div></div>
             <div class="stat-card"><div class="stat-label">RT Inválido</div><div class="stat-value accent2">${invalidCue.length ? Math.round(mean(invalidCue)) : '—'} ms</div></div>
             <div class="stat-card"><div class="stat-label">Efecto orientación</div><div class="stat-value accent">${effect} ms</div></div>`;
  }
  else if (currentTask === 'taskswitch') {
    const valid = data.filter(t => t.correct && t.rt >= 200 && t.rt <= 2000);
    const repeat = valid.filter(t => t.condition === 'repeat').map(t=>t.rt);
    const switchCond = valid.filter(t => t.condition === 'switch').map(t=>t.rt);
    const switchCost = (repeat.length && switchCond.length) ? Math.round(mean(switchCond)-mean(repeat)) : '—';
    html += `<div class="stat-card"><div class="stat-label">RT Repetición</div><div class="stat-value accent3">${repeat.length ? Math.round(mean(repeat)) : '—'} ms</div></div>
             <div class="stat-card"><div class="stat-label">RT Cambio</div><div class="stat-value accent2">${switchCond.length ? Math.round(mean(switchCond)) : '—'} ms</div></div>
             <div class="stat-card"><div class="stat-label">Coste de cambio</div><div class="stat-value accent">${switchCost} ms</div><div class="stat-sub">${valid.length} válidos</div></div>`;
  }
  else if (currentTask === 'wcst') {
    // WCST: calcular métricas agregadas
    const categories = data.filter(t => t.completed_category === true).length;
    const perseverative = data.filter(t => t.is_perseverative === true).length;
    const setLoss = data.filter(t => t.is_set_loss === true).length;
    const conceptualTrials = data.filter(t => t.trials_in_category >= 3).length; // aproximación
    const totalTrialsWCST = data.length;
    const conceptualPercent = (conceptualTrials / totalTrialsWCST * 100).toFixed(1);
    html += `<div class="stat-card"><div class="stat-label">Categorías</div><div class="stat-value accent">${categories}</div></div>
             <div class="stat-card"><div class="stat-label">Errores perseverativos</div><div class="stat-value accent2">${perseverative}</div></div>
             <div class="stat-card"><div class="stat-label">Pérdidas de set</div><div class="stat-value accent2">${setLoss}</div></div>
             <div class="stat-card"><div class="stat-label">Aciertos conceptuales (%)</div><div class="stat-value accent3">${conceptualPercent}%</div></div>`;
  }
  container.innerHTML = html;
}

function renderParticipantTable(data) {
  const participants = [...new Set(data.map(d=>d.participant_id).filter(Boolean))];
  const thead = document.getElementById('participantTableHead');
  const tbody = document.getElementById('participantTableBody');
  document.getElementById('tableCount').innerText = participants.length + ' participantes';
  if (!participants.length) { thead.innerHTML = ''; tbody.innerHTML = '<tr><td colspan="10" class="loading">Sin datos</td></tr>'; return; }
  let columns = ['Participante', 'Grupo', 'Ensayos', 'Precisión'];
  if (['stroop','flanker','simon'].includes(currentTask)) columns.push('RT Cong', 'RT Incong', 'Efecto');
  else if (currentTask === 'gonogo') columns.push("d'", 'Aciertos', 'FA', 'RT Go');
  else if (currentTask === 'ant') columns.push('RT Cong', 'RT Incong', 'Conflicto', 'RT global');
  else if (currentTask === 'nback') columns.push("d'", 'Aciertos', 'FA', 'RT hits');
  else if (currentTask === 'posner') columns.push('RT Válido', 'RT Inválido', 'Efecto');
  else if (currentTask === 'taskswitch') columns.push('RT Repetición', 'RT Cambio', 'Coste cambio');
  else if (currentTask === 'wcst') columns.push('Categorías', 'Persev.', 'Set loss', 'Conceptual%');
  thead.innerHTML = '<table>' + columns.map(c => `<th>${c}</th>`).join('') + '</tr>';
  const rows = participants.map(pid => {
    const pData = data.filter(d => d.participant_id === pid);
    const group = (pData[0]?.group || 'control').toLowerCase();
    const trials = pData.length;
    const acc = (pData.filter(d=>d.correct).length / trials * 100).toFixed(1);
    const groupTag = group === 'experimental' ? '<span class="tag tag-exp">EXP</span>' : '<span class="tag tag-ctrl">CTRL</span>';
    let extra = [];
    if (['stroop','flanker','simon'].includes(currentTask)) {
      const valid = pData.filter(d => d.correct && d.rt >= 200 && d.rt <= 2000);
      const cong = valid.filter(d => d.congruent).map(d=>d.rt);
      const incong = valid.filter(d => !d.congruent).map(d=>d.rt);
      extra = [cong.length ? Math.round(mean(cong)) : '—', incong.length ? Math.round(mean(incong)) : '—', (cong.length && incong.length) ? Math.round(mean(incong)-mean(cong)) : '—'];
    } else if (currentTask === 'gonogo') {
      const go = pData.filter(d => d.stimulus_type === 'go');
      const nogo = pData.filter(d => d.stimulus_type === 'nogo');
      const hits = go.filter(d=>d.correct).length, fa = nogo.filter(d=>!d.correct).length;
      const hr = hits/(go.length||1), far = fa/(nogo.length||1);
      const dp = ((Math.log((hr+0.01)/(1.01-hr)) - Math.log((far+0.01)/(1.01-far))) / 1.414).toFixed(3);
      const rtGo = go.filter(d => d.correct && d.rt>=200 && d.rt<=2000).map(d=>d.rt);
      extra = [dp, hits, fa, rtGo.length ? Math.round(mean(rtGo)) : '—'];
    } else if (currentTask === 'ant') {
      const valid = pData.filter(d => d.correct && d.rt >= 200 && d.rt <= 2000);
      const cong = valid.filter(d => d.flanker_type === 'congruent').map(d=>d.rt);
      const incong = valid.filter(d => d.flanker_type === 'incongruent').map(d=>d.rt);
      extra = [cong.length ? Math.round(mean(cong)) : '—', incong.length ? Math.round(mean(incong)) : '—', (cong.length && incong.length) ? Math.round(mean(incong)-mean(cong)) : '—', valid.length ? Math.round(mean(valid.map(d=>d.rt))) : '—'];
    } else if (currentTask === 'nback') {
      const targets = pData.filter(d => d.is_target === true);
      const nontargets = pData.filter(d => d.is_target === false);
      const hits = targets.filter(d=>d.correct).length, fa = nontargets.filter(d=>!d.correct).length;
      const hr = hits/(targets.length||1), far = fa/(nontargets.length||1);
      const dp = ((Math.log((hr+0.01)/(1.01-hr)) - Math.log((far+0.01)/(1.01-far))) / 1.414).toFixed(3);
      const rtHits = targets.filter(d => d.correct && d.rt>=200 && d.rt<=2000).map(d=>d.rt);
      extra = [dp, hits, fa, rtHits.length ? Math.round(mean(rtHits)) : '—'];
    } else if (currentTask === 'posner') {
      const valid = pData.filter(d => d.correct && d.rt >= 200 && d.rt <= 2000);
      const validCue = valid.filter(d => d.valid_trial === true).map(d=>d.rt);
      const invalidCue = valid.filter(d => d.valid_trial === false).map(d=>d.rt);
      extra = [validCue.length ? Math.round(mean(validCue)) : '—', invalidCue.length ? Math.round(mean(invalidCue)) : '—', (validCue.length && invalidCue.length) ? Math.round(mean(invalidCue)-mean(validCue)) : '—'];
    } else if (currentTask === 'taskswitch') {
      const valid = pData.filter(d => d.correct && d.rt >= 200 && d.rt <= 2000);
      const repeat = valid.filter(d => d.condition === 'repeat').map(d=>d.rt);
      const switchCond = valid.filter(d => d.condition === 'switch').map(d=>d.rt);
      extra = [repeat.length ? Math.round(mean(repeat)) : '—', switchCond.length ? Math.round(mean(switchCond)) : '—', (repeat.length && switchCond.length) ? Math.round(mean(switchCond)-mean(repeat)) : '—'];
    } else if (currentTask === 'wcst') {
      const categories = pData.filter(t => t.completed_category === true).length;
      const perseverative = pData.filter(t => t.is_perseverative === true).length;
      const setLoss = pData.filter(t => t.is_set_loss === true).length;
      const conceptualTrials = pData.filter(t => t.trials_in_category >= 3).length;
      const conceptualPercent = (conceptualTrials / pData.length * 100).toFixed(1);
      extra = [categories, perseverative, setLoss, conceptualPercent+'%'];
    }
    const shortId = pid.slice(-8);
    return '<tr>' + [shortId, groupTag, trials, acc+'%', ...extra].map(c => `<td>${c}</td>`).join('') + '</tr>';
  }).join('');
  tbody.innerHTML = rows;
}

function renderChart(data) {
  const ctx = document.getElementById('taskChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  const participants = [...new Set(data.map(d=>d.participant_id).filter(Boolean))];
  let labels = [], vals = [], labelY = '', color = '#e8ff4a';
  if (['stroop','flanker','simon'].includes(currentTask)) {
    participants.forEach(pid => {
      const pData = data.filter(d=>d.participant_id===pid);
      const valid = pData.filter(d=>d.correct && d.rt>=200 && d.rt<=2000);
      const cong = valid.filter(d=>d.congruent).map(d=>d.rt);
      const incong = valid.filter(d=>!d.congruent).map(d=>d.rt);
      labels.push(pid.slice(-6)); vals.push((cong.length && incong.length) ? mean(incong)-mean(cong) : 0);
    });
    labelY = 'Efecto (ms)'; color = '#e8ff4a';
  } else if (currentTask === 'gonogo' || currentTask === 'nback') {
    participants.forEach(pid => {
      const pData = data.filter(d=>d.participant_id===pid);
      let dp = 0;
      if (currentTask === 'gonogo') {
        const go = pData.filter(d=>d.stimulus_type==='go');
        const nogo = pData.filter(d=>d.stimulus_type==='nogo');
        const hr = go.filter(d=>d.correct).length/(go.length||1);
        const far = nogo.filter(d=>!d.correct).length/(nogo.length||1);
        dp = (Math.log((hr+0.01)/(1.01-hr)) - Math.log((far+0.01)/(1.01-far))) / 1.414;
      } else {
        const tgt = pData.filter(d=>d.is_target===true);
        const non = pData.filter(d=>d.is_target===false);
        const hr = tgt.filter(d=>d.correct).length/(tgt.length||1);
        const far = non.filter(d=>!d.correct).length/(non.length||1);
        dp = (Math.log((hr+0.01)/(1.01-hr)) - Math.log((far+0.01)/(1.01-far))) / 1.414;
      }
      labels.push(pid.slice(-6)); vals.push(dp);
    });
    labelY = "d'"; color = '#4affda';
  } else if (currentTask === 'ant') {
    participants.forEach(pid => {
      const pData = data.filter(d=>d.participant_id===pid);
      const valid = pData.filter(d=>d.correct && d.rt>=200 && d.rt<=2000);
      const cong = valid.filter(d=>d.flanker_type==='congruent').map(d=>d.rt);
      const incong = valid.filter(d=>d.flanker_type==='incongruent').map(d=>d.rt);
      labels.push(pid.slice(-6)); vals.push((cong.length && incong.length) ? mean(incong)-mean(cong) : 0);
    });
    labelY = 'Conflicto (ms)'; color = '#ff4a6e';
  } else if (currentTask === 'posner') {
    participants.forEach(pid => {
      const pData = data.filter(d=>d.participant_id===pid);
      const valid = pData.filter(d=>d.correct && d.rt>=200 && d.rt<=2000);
      const validCue = valid.filter(d=>d.valid_trial===true).map(d=>d.rt);
      const invalidCue = valid.filter(d=>d.valid_trial===false).map(d=>d.rt);
      labels.push(pid.slice(-6)); vals.push((validCue.length && invalidCue.length) ? mean(invalidCue)-mean(validCue) : 0);
    });
    labelY = 'Efecto orientación (ms)'; color = '#e8ff4a';
  } else if (currentTask === 'taskswitch') {
    participants.forEach(pid => {
      const pData = data.filter(d=>d.participant_id===pid);
      const valid = pData.filter(d=>d.correct && d.rt>=200 && d.rt<=2000);
      const repeat = valid.filter(d=>d.condition==='repeat').map(d=>d.rt);
      const switchCond = valid.filter(d=>d.condition==='switch').map(d=>d.rt);
      labels.push(pid.slice(-6)); vals.push((repeat.length && switchCond.length) ? mean(switchCond)-mean(repeat) : 0);
    });
    labelY = 'Coste de cambio (ms)'; color = '#e8ff4a';
  } else if (currentTask === 'wcst') {
    participants.forEach(pid => {
      const pData = data.filter(d=>d.participant_id===pid);
      const categories = pData.filter(t => t.completed_category === true).length;
      labels.push(pid.slice(-6)); vals.push(categories);
    });
    labelY = 'Categorías completadas'; color = '#e8ff4a';
  } else {
    chartInstance = new Chart(ctx, { type:'bar', data:{ labels:['Sin datos'], datasets:[{data:[0]}] } });
    return;
  }
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets:[{ label: labelY, data: vals, backgroundColor: color + 'cc', borderRadius: 3 }] },
    options: { responsive: true, maintainAspectRatio: true }
  });
}

function exportCSV() {
  if (!rawData.length) return;
  const headers = Object.keys(rawData[0]).join(',');
  const rows = rawData.map(row => Object.values(row).map(v => JSON.stringify(v ?? '')).join(',')).join('\n');
  const blob = new Blob([headers + '\n' + rows], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${currentTask}_data_${new Date().toISOString().slice(0,10)}.csv`; a.click();
}

async function exportPDF() {
  const element = document.getElementById('reportContainer');
  const originalOverflow = element.style.overflow;
  element.style.overflow = 'visible';
  const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#0a0a0a' });
  element.style.overflow = originalOverflow;
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p', 'mm', 'a4');
  const imgWidth = 190;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;
  pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
  pdf.save(`${currentTask}_dashboard_${new Date().toISOString().slice(0,10)}.pdf`);
}
